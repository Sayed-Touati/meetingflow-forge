app:
  id: ari:cloud:ecosystem::app/00e4214a-c469-4fcb-90ef-d1f4c9d4bbc6
  runtime:
    name: nodejs22.x

modules:
  confluence:globalPage:
    - key: meetingflow-page
      resource: main
      route: meetingflow
      resolver:
        function: resolver
      render: native
      title: MeetingFlow

  trigger:
    - key: meeting-note-page-updated
      function: handle-page-event
      events:
        - avi:confluence:created:page
        - avi:confluence:updated:page

  function:
    - key: handle-page-event
      handler: index.handlePageEvent
    - key: resolver
      handler: resolvers/index.handler
      providers:
        auth:
          - google

resources:
  - key: main
    path: src/frontend/index.jsx

remotes:
  - key: google-apis
    baseUrl: https://www.googleapis.com
  - key: google-account
    baseUrl: https://accounts.google.com
  - key: google-oauth
    baseUrl: https://oauth2.googleapis.com

providers:
  auth:
    - key: google
      name: Google
      type: oauth2
      clientId: 1095965995923-3m79q6thrqtu0kp6h9bnf12ppcfvpe82.apps.googleusercontent.com
      remotes:
        - google-apis
      bearerMethod: authorization-header
      scopes:
        - profile
        - https://www.googleapis.com/auth/userinfo.email
        - https://www.googleapis.com/auth/calendar.events
      actions:
        authorization:
          remote: google-account
          path: /o/oauth2/v2/auth
          queryParameters:
            access_type: offline
            prompt: consent
        exchange:
          remote: google-oauth
          path: /token
        refreshToken:
          remote: google-oauth
          path: /token
        revokeToken:
          remote: google-oauth
          path: /revoke
        retrieveProfile:
          remote: google-apis
          path: /userinfo/v2/me
          resolvers:
            id: id
            displayName: email
            avatarUrl: picture

permissions:
  external:
    fetch:
      backend:
        - https://www.googleapis.com
        - https://accounts.google.com
        - https://oauth2.googleapis.com
  scopes:
    - read:confluence-content.summary
    - read:confluence-user
    - read:page:confluence
    - search:confluence
    - storage:app
    - delete:page:confluence
    - write:confluence-content
    - write:page:confluence
