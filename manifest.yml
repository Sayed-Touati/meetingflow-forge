app:
  id: ari:cloud:ecosystem::app/00e4214a-c469-4fcb-90ef-d1f4c9d4bbc6
  runtime:
    name: nodejs22.x

modules:
  confluence:globalPage:
    - key: meetingflow-page
      resource: main
      route: meetingflow
      resolver:
        function: resolver
      render: native
      title: MeetingFlow

  trigger:
    - key: meeting-note-page-updated
      function: handle-page-event
      events:
        - avi:confluence:created:page
        - avi:confluence:updated:page

  function:
    - key: handle-page-event
      handler: index.handlePageEvent
    - key: resolver
      handler: resolvers/index.handler

resources:
  - key: main
    path: src/frontend/index.jsx

permissions:
  scopes:
    - read:confluence-content.summary
    - read:confluence-user
    - read:page:confluence
    - search:confluence
    - storage:app
    - write:page:confluence
